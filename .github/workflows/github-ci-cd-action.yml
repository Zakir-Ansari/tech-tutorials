name: Docker Image CI

on:
  push:
    branches: [ "github-ci-cd-actions-tutorial" ]


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Java JDK
      uses: actions/setup-java@v5.2.0
      with:
        distribution: 'temurin'
        java-version: 25

    - name: Build Jar
      run: |
        cd github-actions-ci-cd
        ./mvnw clean package -DskipTests

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image
      run: |
        cd github-actions-ci-cd
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-cd-demo:latest .

    - name: Push Image to Dockere Hub
      run: |
        cd github-actions-ci-cd
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-cd-demo:latest

    - name: SSH and Deploy to EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop spring-boot-ci-cd-demo || true
          docker rm spring-boot-ci-cd-demo || true
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-cd-demo:latest
          docker run -d --name spring-boot-ci-cd-demo -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-cd-demo:latest
      
